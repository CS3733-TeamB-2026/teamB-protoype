name: Build and Push to Docker Hub

on:
  push:
    branches: [ "python" ] # Runs every time you push to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Build & Push ML Server (Updated folder name)
      - name: Build ML Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/python/Dockerfile # Changed from apps/ml-server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/teamb-ml-server:latest

      # 2. Build & Push Backend
      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/teamb-backend:latest

      # 3. Build & Push Frontend
      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/teamb-frontend:latest